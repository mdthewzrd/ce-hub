<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CE-Hub</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="CE-Hub">
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            font-size: 14px;
        }

        .terminal {
            height: calc(100vh - 60px);
            overflow-y: auto;
            padding: 10px;
            background: #0c0c0c;
            border: 1px solid #444;
        }

        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: #2d2d30;
            border-top: 1px solid #444;
        }

        input {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: #d4d4d4;
            font-family: monospace;
            font-size: 16px;
        }

        button {
            padding: 15px 20px;
            background: #007acc;
            color: white;
            border: none;
            font-family: monospace;
        }

        .output {
            white-space: pre-wrap;
            margin-bottom: 10px;
            padding: 5px;
        }

        .command {
            color: #569cd6;
        }

        .error {
            color: #f44747;
        }
    </style>
</head>
<body>
    <div class="terminal" id="terminal">
        <div class="output">CE-Hub Mobile Terminal</div>
        <div class="output">Type commands below...</div>
    </div>

    <div class="input-area">
        <input type="text" id="cmdInput" placeholder="Enter command..." autocomplete="off" autocapitalize="off">
        <button onclick="send()">Send</button>
    </div>

    <script>
        const API_BASE = 'https://michaels-macbook-pro-2.tail6d4c6d.ts.net';
        const TOKEN = '171158e5e011bb1d3e50a387a8234d60871323ce9463ec1ff4a1194cd686cfb4';

        document.getElementById('cmdInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') send();
        });

        async function send() {
            const input = document.getElementById('cmdInput');
            const cmd = input.value.trim();
            if (!cmd) return;

            // Show command
            addOutput(`$ ${cmd}`, 'command');
            input.value = '';

            try {
                const response = await fetch(`${API_BASE}/send`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: cmd,
                        mode: 'ask',
                        wait_ms: 3000
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    addOutput(data.full_response || data.preview || 'Done');
                } else {
                    addOutput(`Error: ${response.status}`, 'error');
                }
            } catch (error) {
                addOutput(`Network error: ${error.message}`, 'error');
            }
        }

        function addOutput(text, className = '') {
            const terminal = document.getElementById('terminal');
            const div = document.createElement('div');
            div.className = `output ${className}`;
            div.textContent = text;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }
    </script>
</body>
</html>
