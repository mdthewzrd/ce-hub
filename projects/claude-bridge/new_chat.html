<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CE-Hub Mobile Chat</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CE-Hub Chat">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: #161b22;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #30363d;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        .chat-container {
            height: calc(100vh - 140px);
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        .user-message {
            text-align: right;
        }

        .user-message .bubble {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 16px;
            border-radius: 20px 20px 5px 20px;
            display: inline-block;
            max-width: 80%;
            backdrop-filter: blur(10px);
        }

        .ai-message {
            text-align: left;
        }

        .ai-message .bubble {
            background: rgba(255,255,255,0.9);
            color: #333;
            padding: 12px 16px;
            border-radius: 20px 20px 20px 5px;
            display: inline-block;
            max-width: 80%;
            backdrop-filter: blur(10px);
        }

        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #161b22;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #30363d;
        }

        .input-field {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 12px 16px;
            border-radius: 25px;
            color: #c9d1d9;
            font-size: 16px;
            outline: none;
        }

        .input-field:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
        }

        .input-field::placeholder {
            color: #8b949e;
        }

        .send-button {
            background: #238636;
            border: 1px solid #30363d;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .send-button:hover {
            background: #2ea043;
            transform: scale(1.05);
        }

        .send-button:disabled {
            opacity: 0.5;
            background: #21262d;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 10px;
            opacity: 0.7;
        }

        .model-selector {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 5px;
            outline: none;
        }

        .model-selector:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing {
            display: none;
            text-align: left;
            padding: 10px 20px;
            font-style: italic;
            opacity: 0.7;
        }

        .typing.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">CE-Hub Chat</div>
        <div class="subtitle">Talk to your AI assistant</div>
        <select class="model-selector" id="modelSelect">
            <option value="claude-3-haiku-20240307">Claude Haiku</option>
            <option value="claude-3-sonnet-20240229">Claude Sonnet</option>
            <option value="claude-3-5-sonnet-20241022">Claude Sonnet 3.5</option>
            <option value="glm-4.5">GLM 4.5</option>
            <option value="glm-4.5-air">GLM 4.5 Air</option>
            <option value="glm-4.6">GLM 4.6</option>
        </select>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            <div class="bubble">
                👋 Hi! I'm your CE-Hub AI assistant. Ask me anything about coding, development, or general questions!
            </div>
        </div>
    </div>

    <div class="typing" id="typing">AI is typing...</div>

    <div class="input-area">
        <input type="text" class="input-field" id="messageInput" placeholder="Ask me anything..."
               autocomplete="off" autocapitalize="sentences" autocorrect="on">
        <button class="send-button" id="sendButton">➤</button>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const TOKEN = '171158e5e011bb1d3e50a387a8234d60871323ce9463ec1ff4a1194cd686cfb4';
        const GLM_API_KEY = '05d75ef6fbe645c78d10d92dd4b2a3a3.o0Dmxb2c2EMnmjkY';

        let currentModel = 'claude-3-haiku-20240307';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
            addWelcomeMessage();
        });

        function setupEventListeners() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendButton');
            const modelSelect = document.getElementById('modelSelect');

            // Send message on Enter
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // Send message on button click
            sendBtn.addEventListener('click', sendMessage);

            // Model selection
            modelSelect.addEventListener('change', function(e) {
                switchModel(e.target.value);
            });

            // Auto-focus input
            input.focus();
        }

        function addWelcomeMessage() {
            // Welcome message already added in HTML
        }

        async function switchModel(modelId) {
            try {
                const response = await fetch(`${API_BASE}/switch-model`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: modelId,
                        api_key: modelId.includes('glm') ? GLM_API_KEY : null
                    })
                });

                if (response.ok) {
                    currentModel = modelId;
                    addSystemMessage(`✅ Switched to ${modelId}`);
                } else {
                    addSystemMessage(`❌ Failed to switch to ${modelId}`);
                }
            } catch (error) {
                addSystemMessage(`❌ Error switching model: ${error.message}`);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            addUserMessage(message);
            input.value = '';

            // Show typing indicator
            showTyping(true);

            try {
                const response = await fetch(`${API_BASE}/send`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: message,
                        mode: 'chat',
                        wait_ms: 5000,
                        model: currentModel
                    })
                });

                showTyping(false);

                if (response.ok) {
                    const data = await response.json();
                    const aiResponse = data.full_response || data.preview || 'Sorry, no response available.';
                    addAIMessage(aiResponse);
                } else {
                    addAIMessage('❌ Sorry, I encountered an error. Please try again.');
                }
            } catch (error) {
                showTyping(false);
                addAIMessage('❌ Network error. Please check your connection.');
            }
        }

        function addUserMessage(text) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user-message';
            messageDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function addAIMessage(text) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            messageDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai-message';
            messageDiv.innerHTML = `<div class="bubble" style="opacity: 0.8; font-style: italic;">${escapeHtml(text)}</div>`;
            container.appendChild(messageDiv);
            scrollToBottom();
        }

        function showTyping(show) {
            const typing = document.getElementById('typing');
            typing.className = show ? 'typing show' : 'typing';
            if (show) scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
